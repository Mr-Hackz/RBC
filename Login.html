<!-- Other Login Form -->
<div class="login-container">
    <h2>RBC Learning Portal</h2>
    <form id="otherLoginForm">
        <label for="otherUsername">Username</label><br>
        <input type="text" id="otherUsername" placeholder="Username"><br><br>

        <label for="otherPassword">Password</label><br>
        <input type="password" id="otherPassword" placeholder="Password"><br><br>

        <button type="submit" class="login-btn">Log In</button>
    </form>
    <p id="otherLoginError" style="color:red;"></p>
</div>

<script>
// ✅ Other login accounts stored locally
const otherAccounts = {
    AdminRBC: {
        password: "RBC123",
        page: "User1timetable.html"
    },
    Teacher255: {
        password: "Teaching245",
        page: "User1timetable.html"
    },
    charlie: {
        password: "mypassword",
        page: "User1timetable.html"
    }
};

// Bind to the other login form only
document.getElementById("otherLoginForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const username = document.getElementById("otherUsername").value.trim();
    const password = document.getElementById("otherPassword").value.trim();
    const error = document.getElementById("otherLoginError");

    error.innerText = "";

    // ❌ Empty fields
    if (!username || !password) {
        error.innerText = "Please enter both username and password.";
        return;
    }

    // ❌ Username not found
    if (!otherAccounts[username]) {
        error.innerText = "Username not found.";
        return;
    }

    // ❌ Incorrect password
    if (otherAccounts[username].password !== password) {
        error.innerText = "Incorrect password.";
        return;
    }

    // ✅ Success → store login state locally
    localStorage.setItem("loggedInUser", username);

    // Redirect to the user's page
    window.location.href = otherAccounts[username].page;
});
</script>
